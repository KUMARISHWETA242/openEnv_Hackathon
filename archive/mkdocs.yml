site_name: Satellite Constellation Management Environment
site_description: OpenEnv environment for satellite constellation management using reinforcement learning
site_author: OpenEnv Hackathon Team
site_url: https://your-username.github.io/satellite-constellation-env

# Repository
repo_name: satellite-constellation-env
repo_url: https://github.com/your-username/satellite-constellation-env
edit_uri: edit/main/docs/

# Theme
theme:
  name: material
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  features:
    - content.code.copy
    - content.code.select
    - content.footnote.tooltips
    - content.tabs.link
    - content.tooltips
    - header.autohide
    - navigation.expand
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.prune
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
    - toc.integrate

# Plugins
plugins:
  - search
  - macros
  - minify:
      minify_html: true

# Extensions
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - meta
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      emoji_index: !!python/name:material.extensions.emoji.twemoji
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      normalize_issue_symbols: true
      repo_url_shorthand: true
      user: your-username
      repo: satellite-constellation-env
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      check_paths: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - tables
  - toc:
      permalink: true

# Navigation
nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quick-start.md
      - Basic Usage: getting-started/basic-usage.md
  - User Guide:
      - Environment Overview: user-guide/overview.md
      - Action Space: user-guide/action-space.md
      - Observation Space: user-guide/observation-space.md
      - Reward Function: user-guide/reward-function.md
      - Tasks: user-guide/tasks.md
  - API Reference:
      - Core Classes: api-reference/core-classes.md
      - Data Models: api-reference/data-models.md
      - Task Classes: api-reference/task-classes.md
      - Examples: api-reference/examples.md
  - Development:
      - Setup: development/setup.md
      - Extending Environment: development/extending.md
      - Testing: development/testing.md
      - Contributing: development/contributing.md
  - About:
      - Motivation: about/motivation.md
      - Technical Details: about/technical-details.md
      - Future Work: about/future-work.md

# Extra
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/your-username/satellite-constellation-env
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/satellite-env/

  generator: false

