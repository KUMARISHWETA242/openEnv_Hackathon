name: satellite-constellation
version: 0.1.0
description: |
  Satellite Constellation Management Environment

  This environment simulates managing a constellation of satellites with limited resources
  (battery, storage, communication windows) to perform tasks like capturing Earth images,
  downlinking data, and maintenance maneuvers.

  The goal is to maximize mission value by making optimal sequential decisions in a dynamic
  environment affected by orbital mechanics, weather, and resource constraints.

authors:
  - OpenEnv Hackathon Team

license: MIT

tags:
  - reinforcement-learning
  - satellite
  - resource-management
  - real-world

observation_space:
  type: custom
  description: |
    Observation contains:
    - satellites: List of satellite states (position, battery, storage, last_action)
    - time_step: Current time step
    - ground_stations: List of ground station locations
    - weather_conditions: Dict of region -> cloud cover
    - pending_tasks: List of tasks to be assigned

action_space:
  type: custom
  description: |
    Action specifies actions for each satellite:
    - satellite_actions: Dict[satellite_id -> action]
    - Actions: 'capture' (take image), 'downlink' (send data), 'maintain' (charge), 'idle'

reward_space:
  type: continuous
  range: [-inf, inf]
  description: |
    Reward is a float value with components breakdown.
    Positive for successful actions, negative for invalid ones.

episode_max_length: 200

tasks:
  - name: easy
    description: Basic imaging with 3 satellites
  - name: medium
    description: Data management with 5 satellites
  - name: hard
    description: Full coordination with 8 satellites and weather

baseline_scores:
  easy: 0.7
  medium: 0.5
  hard: 0.3